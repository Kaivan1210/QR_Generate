<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mainContainer">
        <div class="sidebar">
            <img src="./images/qrpng.png" alt="qr png">
            <div class="textContainer">
                <h1>Generate QR Code</h1>
                <p>Just in one click</p>
            </div>
        </div>
        <div class="homeContainer">
            <div class="home">
               <h2>Enter Text or URL</h2>
               <!--<input type="text" id="qrInput" placeholder="Text or URL">-->
               <textarea id="qrInput" placeholder="Enter text or URL..."></textarea>
                <button id="generateBtn">Generate QR Code</button> 
            </div>
        </div>
       </div>

       <div id="qrPopup">
        <h2>QR Generated</h2>
        <img src="" alt="qr image">
        <button id="downloadBtn">Download QR Code</button>
        <button id="close">Close</button>
       </div>


    <script src="script.js"></script>
</body>
</html>
